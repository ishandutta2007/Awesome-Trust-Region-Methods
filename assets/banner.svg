<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#070a13"/>
    </linearGradient>
    
    <!-- Accent Gradient 1 -->
    <linearGradient id="accentGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    
    <!-- Accent Gradient 2 (Trust Region) -->
    <radialGradient id="trustRegionGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#4f46e5" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Trust Region Visual Representation (Circle & Contour Lines) -->
  <g transform="translate(900, 200)">
    <!-- Radial Glow -->
    <circle r="180" fill="url(#trustRegionGrad)"/>
    
    <!-- Outer boundary (Clipped/Hard Constraint) -->
    <circle r="140" fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="8 6" stroke-opacity="0.6"/>
    
    <!-- Inner stable steps -->
    <circle r="90" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle r="40" fill="none" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.2"/>

    <!-- Mathematical steps/Vector path inside trust region -->
    <path d="M -160,110 Q -80,40 -20,10 T 30,-30 T 80,-10" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Step nodes -->
    <circle cx="-160" cy="110" r="5" fill="#ef4444"/>
    <circle cx="-88" cy="55" r="4" fill="#f59e0b"/>
    <circle cx="-20" cy="10" r="4" fill="#3b82f6"/>
    <circle cx="30" cy="-30" r="4" fill="#10b981"/>
    <circle cx="80" cy="-10" r="6" fill="#10b981"/>
    
    <!-- Label annotations -->
    <text x="90" y="-20" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#10b981" font-weight="bold">Optimal Step</text>
    <text x="-210" y="130" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#ef4444" font-weight="bold">Start State (\theta_0)</text>
    <line x1="0" y1="0" x2="80" y2="-120" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="90" y="-120" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#a1a1aa">Trust Region \Delta_k</text>
  </g>

  <!-- Left Side: Typography & Decorative Lines -->
  <g transform="translate(80, 0)">
    <!-- Tech Deco Bar -->
    <rect y="110" width="8" height="180" fill="url(#accentGrad1)" rx="4"/>
    
    <!-- Main Title -->
    <text x="35" y="160" font-family="'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" letter-spacing="-1">
      Awesome Trust-Region Methods
    </text>
    
    <!-- Subtitle -->
    <text x="35" y="210" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#94a3b8">
      A curated landscape of optimization, policy safety, &amp; robust AI scaling.
    </text>

    <!-- Tech Badges inside SVG -->
    <g transform="translate(35, 250)">
      <!-- Badge 1 -->
      <rect width="110" height="28" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
      <text x="55" y="18" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#818cf8" text-anchor="middle">OPTIMIZATION</text>

      <!-- Badge 2 -->
      <rect x="125" width="130" height="28" rx="6" fill="#083344" stroke="#155e75" stroke-width="1"/>
      <text x="190" y="18" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#22d3ee" text-anchor="middle">REINFORCEMENT LEARNING</text>

      <!-- Badge 3 -->
      <rect x="265" width="90" height="28" rx="6" fill="#064e3b" stroke="#065f46" stroke-width="1"/>
      <text x="310" y="18" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" fill="#34d399" text-anchor="middle">SAFE AI</text>
    </g>
  </g>
</svg>
